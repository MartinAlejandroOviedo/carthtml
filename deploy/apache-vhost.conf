<VirtualHost *:80>
  ServerName ejemplo.com
  ServerAdmin admin@ejemplo.com

  ProxyPreserveHost On
  ProxyPass / http://127.0.0.1:3000/
  ProxyPassReverse / http://127.0.0.1:3000/

  # Si usas HTTPS con certbot, mantener este header ayuda con apps detrás de proxy.
  RequestHeader set X-Forwarded-Proto "http"

  ErrorLog ${APACHE_LOG_DIR}/carthtml_error.log
  CustomLog ${APACHE_LOG_DIR}/carthtml_access.log combined
</VirtualHost>
