<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel | Seguridad</title>
    <script src="/vendor/lucide/lucide.min.js"></script>
    <link rel="stylesheet" href="/tailwind.css" />
    <link rel="stylesheet" href="/styles.css" />
    <script>
      const TOKEN_KEY = 'panel_token';
      if (!localStorage.getItem(TOKEN_KEY)) {
        window.location.replace('/panel/login.html');
      }
    </script>
  </head>
  <body class="bg-slate-950 text-slate-100 font-body min-h-screen">
    <div class="fixed inset-0 -z-10 bg-mesh"></div>

    <main class="mx-auto max-w-6xl px-4 py-6 space-y-4">
      <div id="panel-topbar"></div>
      <div id="panel-nav"></div>

      <section id="security-content" class="rounded-2xl border border-white/10 bg-slate-900/75 p-4">
        <div class="rounded-2xl border border-white/10 bg-slate-950/40 p-4">
          <p class="font-display text-2xl uppercase text-white">Seguridad</p>
          <p class="mt-2 text-sm text-slate-300">Cargando contenido...</p>
        </div>
      </section>
    </main>

    <script type="module" src="/panel/js/security.js"></script>
  </body>
</html>
