<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrito | SLStore</title>
    <!-- SEO_META -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700&family=Manrope:wght@400;500;700;800&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/tailwind.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="bg-slate-950 text-slate-100 font-body" data-page="cart">
    <div class="fixed inset-0 -z-10 bg-mesh"></div>

    <main class="min-h-screen">
      <div id="site-header"></div>

      <section class="mx-auto max-w-6xl px-4 pt-8">
        <div class="rounded-3xl border border-white/10 bg-slate-900/75 p-5 shadow-2xl shadow-slate-950/60 space-y-4">
          <div class="flex flex-wrap items-center justify-between gap-3">
            <div>
              <p class="font-display text-3xl uppercase text-white">Tu carrito</p>
              <p class="text-sm text-slate-300">Revisa los productos y confirmá tu pedido.</p>
            </div>
            <a href="/" class="rounded-xl border border-white/20 px-3 py-2 text-sm text-slate-100 transition hover:border-sky-300/40 hover:text-white">Seguir comprando</a>
          </div>

          <div class="grid gap-4 lg:grid-cols-3">
            <div class="space-y-3 lg:col-span-2">
              <div id="cart-items" class="space-y-3">
                <p class="text-sm text-slate-400">Tu carrito esta vacio.</p>
              </div>
            </div>

            <div class="space-y-3">
              <div class="rounded-2xl border border-white/10 bg-slate-950/50 p-4 space-y-2">
                <div class="flex items-center justify-between text-sm text-slate-400">
                  <span>Subtotal</span>
                  <span id="cart-total" class="text-slate-100">$ 0</span>
                </div>
                <div class="flex items-center justify-between text-sm text-slate-400">
                  <span>Envio</span>
                  <span id="shipping-cost" class="text-slate-100">$ 0</span>
                </div>
                <div class="border-t border-white/10 pt-2 flex items-center justify-between">
                  <span class="text-sm text-slate-300">Total</span>
                  <span id="order-total" class="text-2xl font-bold text-sky-300">$ 0</span>
                </div>
              </div>

              <form id="checkout-form" class="space-y-3">
                <input
                  name="name"
                  required
                  placeholder="Nombre y apellido"
                  class="w-full rounded-xl border border-white/10 bg-slate-950/60 px-3 py-2 text-sm text-white placeholder:text-slate-500"
                />
                <input
                  name="phone"
                  required
                  placeholder="Teléfono"
                  class="w-full rounded-xl border border-white/10 bg-slate-950/60 px-3 py-2 text-sm text-white placeholder:text-slate-500"
                />
                <input
                  name="address"
                  placeholder="Dirección de entrega"
                  class="w-full rounded-xl border border-white/10 bg-slate-950/60 px-3 py-2 text-sm text-white placeholder:text-slate-500"
                />
                <textarea
                  name="notes"
                  rows="3"
                  placeholder="Notas (opcional)"
                  class="w-full rounded-xl border border-white/10 bg-slate-950/60 px-3 py-2 text-sm text-white placeholder:text-slate-500"
                ></textarea>
                <button
                  type="submit"
                  class="w-full rounded-xl bg-primary-600 py-2.5 font-semibold text-white transition hover:bg-primary-500"
                >
                  Confirmar pedido
                </button>
              </form>

              <a
                id="whatsapp-link"
                href="#"
                target="_blank"
                class="hidden w-full rounded-xl bg-emerald-600 py-2.5 text-center font-semibold text-white"
              >
                Enviar por WhatsApp
              </a>
              <p id="checkout-message" class="text-sm"></p>
            </div>
          </div>
        </div>
      </section>

      <div id="site-footer"></div>
    </main>

    <script type="module" src="/js/cart-page.js"></script>
  </body>
</html>
