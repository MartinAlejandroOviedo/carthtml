<div class="mx-auto max-w-6xl px-4 pt-8">
  <header class="mb-6 rounded-2xl border border-white/10 bg-slate-900/70 px-4 py-3">
    <div class="flex items-center justify-between gap-3">
      <a href="/" class="flex items-center gap-2 text-sky-300">
        <img
          data-store-logo
          class="hidden"
          style="max-height:34px;max-width:180px;width:auto;height:auto;object-fit:contain"
          aria-hidden="true"
        />
        <span data-store-name class="font-display text-lg uppercase tracking-widest">SLStore</span>
      </a>

      <nav class="hidden items-center gap-2 text-sm text-slate-300 md:flex">
        <a href="/" class="inline-flex items-center gap-2 rounded-lg px-3 py-1.5 transition hover:bg-sky-500/20 hover:text-white">
          <span class="lucide h-4 w-4" data-lucide="house"></span>
          Inicio
        </a>
        <a href="/cart.html" class="inline-flex items-center gap-2 rounded-lg px-3 py-1.5 transition hover:bg-sky-500/20 hover:text-white">
          <span class="lucide h-4 w-4" data-lucide="shopping-bag"></span>
          Carrito
        </a>
        <a href="/help.html" class="inline-flex items-center gap-2 rounded-lg px-3 py-1.5 transition hover:bg-sky-500/20 hover:text-white">
          <span class="lucide h-4 w-4" data-lucide="circle-help"></span>
          Ayuda
        </a>
      </nav>

      <div class="flex items-center gap-2">
        <button
          id="mobile-menu-open"
          class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-white/20 bg-slate-900/60 text-slate-100 transition hover:bg-slate-800/70 md:hidden"
          aria-label="Abrir menu"
          type="button"
        >
          <span class="lucide" data-lucide="menu"></span>
        </button>
        <button
          id="cart-toggle"
          class="relative inline-flex h-11 w-11 items-center justify-center rounded-full border border-sky-300/30 bg-sky-500/20 text-sky-100 transition hover:bg-sky-500/35 has-tooltip"
          aria-label="Ver carrito"
          data-tooltip="Ver carrito"
        >
          <span class="lucide" data-lucide="shopping-bag"></span>
          <span
            id="cart-count"
            class="absolute -top-2 -right-2 inline-flex h-5 w-5 items-center justify-center rounded-full bg-sky-200 text-xs text-sky-900"
            >0</span
          >
        </button>
      </div>
    </div>
  </header>
</div>

<div id="mobile-menu-overlay" class="fixed inset-0 z-40 hidden bg-slate-950/75 md:hidden"></div>
<aside
  id="mobile-menu-drawer"
  class="fixed inset-y-0 left-0 z-50 w-[84%] max-w-xs -translate-x-full border-r border-white/10 bg-slate-900 shadow-2xl transition-transform duration-300 md:hidden"
  aria-hidden="true"
>
  <div class="flex items-center justify-between border-b border-white/10 px-4 py-4">
    <p class="font-display text-lg uppercase tracking-widest text-white">Menu</p>
    <button
      id="mobile-menu-close"
      class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-white/20 text-slate-100"
      aria-label="Cerrar menu"
      type="button"
    >
      <span class="lucide h-4 w-4" data-lucide="x"></span>
    </button>
  </div>
  <nav class="flex flex-col gap-1 p-3 text-sm text-slate-200">
    <a href="/" class="inline-flex items-center gap-2 rounded-lg px-3 py-2 transition hover:bg-sky-500/20 hover:text-white">
      <span class="lucide h-4 w-4" data-lucide="house"></span>
      Inicio
    </a>
    <a href="/cart.html" class="inline-flex items-center gap-2 rounded-lg px-3 py-2 transition hover:bg-sky-500/20 hover:text-white">
      <span class="lucide h-4 w-4" data-lucide="shopping-bag"></span>
      Carrito
    </a>
    <a href="/help.html" class="inline-flex items-center gap-2 rounded-lg px-3 py-2 transition hover:bg-sky-500/20 hover:text-white">
      <span class="lucide h-4 w-4" data-lucide="circle-help"></span>
      Ayuda
    </a>
  </nav>
</aside>
