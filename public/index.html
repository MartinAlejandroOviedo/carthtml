<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SLStore</title>
    <!-- SEO_META -->
    <script src="/vendor/lucide/lucide.min.js" defer></script>
    <link rel="stylesheet" href="/tailwind.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="bg-slate-950 text-slate-100 font-body" data-page="home">
    <div class="fixed inset-0 -z-10 bg-mesh"></div>
    <main class="min-h-screen">
      <div id="site-header"></div>

      <section class="mx-auto max-w-6xl px-4 pt-8">
        <div class="rounded-3xl border border-white/10 bg-slate-900/70 p-5 shadow-2xl shadow-sky-950/60 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
          <div>
            <p class="font-display text-4xl uppercase leading-none text-white sm:text-5xl">
              Equipate para tu proximo partido
            </p>
            <p class="mt-3 max-w-xl text-sm text-slate-300">
              Elegi productos, armamos tu pedido y lo enviamos directo por WhatsApp con detalle completo.
            </p>
          </div>
          <div class="flex gap-3">
            <button
              id="filters-toggle"
              class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-sky-300/30 bg-sky-500/20 text-sky-100 transition hover:bg-sky-500/35 has-tooltip"
              aria-label="Filtros y orden"
              data-tooltip="Filtros y orden"
            >
              <span class="lucide" data-lucide="sliders-horizontal"></span>
            </button>
          </div>
        </div>
      </section>

      <section class="mx-auto max-w-6xl px-4 py-6">
        <div id="category-filters" class="mb-4 hidden"></div>
        <div id="products-grid" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
      </section>


      <aside
        id="cart-panel"
        class="fixed inset-y-0 right-0 z-30 flex w-full max-w-md translate-x-full flex-col border-l border-white/10 bg-slate-900 shadow-2xl transition-transform duration-300"
      >
        <div class="flex items-center justify-between border-b border-white/10 p-4">
          <h3 class="font-display text-2xl uppercase text-white">Tu pedido</h3>
          <button id="close-cart" class="text-sm text-slate-300">Cerrar</button>
        </div>

        <div class="flex-1 space-y-4 overflow-y-auto p-4">
          <div id="cart-items" class="space-y-3"></div>

          <div class="rounded-2xl border border-white/10 bg-slate-800/80 p-4 space-y-2">
            <div class="flex items-center justify-between text-sm text-slate-400">
              <span>Subtotal</span>
              <span id="cart-total" class="text-slate-100">$ 0</span>
            </div>
            <div class="flex items-center justify-between text-sm text-slate-400">
              <span>Envio</span>
              <span id="shipping-cost" class="text-slate-100">$ 0</span>
            </div>
            <div class="border-t border-white/10 pt-2 flex items-center justify-between">
              <span class="text-sm text-slate-300">Total</span>
              <span id="order-total" class="text-2xl font-bold text-sky-300">$ 0</span>
            </div>
          </div>

          <form id="checkout-form" class="space-y-3">
            <input
              name="name"
              required
              placeholder="Nombre y apellido"
              class="w-full rounded-xl border border-white/10 bg-slate-950/60 px-3 py-2 text-sm text-white placeholder:text-slate-500"
            />
            <input
              name="phone"
              required
              placeholder="Teléfono"
              class="w-full rounded-xl border border-white/10 bg-slate-950/60 px-3 py-2 text-sm text-white placeholder:text-slate-500"
            />
            <input
              name="province"
              required
              placeholder="Provincia"
              class="w-full rounded-xl border border-white/10 bg-slate-950/60 px-3 py-2 text-sm text-white placeholder:text-slate-500"
            />
            <input
              name="city"
              required
              placeholder="Ciudad"
              class="w-full rounded-xl border border-white/10 bg-slate-950/60 px-3 py-2 text-sm text-white placeholder:text-slate-500"
            />
            <input
              name="postalCode"
              required
              placeholder="Codigo postal"
              class="w-full rounded-xl border border-white/10 bg-slate-950/60 px-3 py-2 text-sm text-white placeholder:text-slate-500"
            />
            <label for="checkout-delivery-type" class="sr-only">Tipo de entrega</label>
            <select
              id="checkout-delivery-type"
              name="deliveryType"
              class="w-full rounded-xl border border-white/10 bg-slate-950/60 px-3 py-2 text-sm text-white"
            >
              <option value="home">Envío a domicilio</option>
              <option value="branch">Retiro en sucursal Correo Argentino</option>
            </select>
            <div id="checkout-address-wrap">
            <input
              name="address"
              placeholder="Dirección de entrega"
              class="w-full rounded-xl border border-white/10 bg-slate-950/60 px-3 py-2 text-sm text-white placeholder:text-slate-500"
            />
            </div>
            <div id="checkout-branch-wrap" class="hidden">
              <input
                name="deliveryBranch"
                placeholder="Sucursal Correo Argentino (ej: Centro - Córdoba)"
                class="w-full rounded-xl border border-white/10 bg-slate-950/60 px-3 py-2 text-sm text-white placeholder:text-slate-500"
              />
            </div>
            <textarea
              name="notes"
              rows="3"
              placeholder="Notas (opcional)"
              class="w-full rounded-xl border border-white/10 bg-slate-950/60 px-3 py-2 text-sm text-white placeholder:text-slate-500"
            ></textarea>
            <input name="website" type="text" tabindex="-1" autocomplete="off" class="hidden" aria-hidden="true" />
            <button
              type="submit"
              class="w-full rounded-xl bg-primary-600 py-2.5 font-semibold text-white transition hover:bg-primary-500"
            >
              Confirmar pedido
            </button>
          </form>

          <a
            id="whatsapp-link"
            href="#"
            target="_blank"
            class="hidden w-full rounded-xl bg-emerald-600 py-2.5 text-center font-semibold text-white"
            >Enviar por WhatsApp</a
          >
          <p id="checkout-message" class="text-sm"></p>
        </div>
      </aside>

      <div id="backdrop" class="fixed inset-0 z-20 hidden bg-slate-950/70"></div>
      <div id="filters-backdrop" class="fixed inset-0 z-20 hidden bg-slate-950/70"></div>
      <div id="filters-root"></div>

      <div id="site-footer"></div>
    </main>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
